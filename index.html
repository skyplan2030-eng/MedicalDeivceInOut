<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>장비 반출입 관리 (구글시트 연동 완벽 패치형)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;600;700&family=IBM+Plex+Mono:wght=500;600;700&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F6F3;
    --surface:#FFFFFF;
    --ink:#152420;
    --ink-soft:#5B6B64;
    --teal:#0E6E66;
    --teal-dark:#0A4A45;
    --teal-tint:#E3F0EE;
    --alert:#C1401F;
    --alert-tint:#FBE7DF;
    --ok:#2F7A52;
    --ok-tint:#E3F1E7;
    --border:#DCE3DE;
    --line:#C7D0CB;
    --stub-w:52px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  
  #app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,0.06);display:flex;flex-direction:column;}

  /* ---- Header ---- */
  header.topbar{
    background:var(--teal-dark);color:#fff;padding:18px 18px 16px;position:sticky;top:0;z-index:20;
  }
  header.topbar .header-flex{display:flex;justify-content:space-between;align-items:center;}
  header.topbar .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9FD4CC;
  }
  header.topbar h1{
    font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;margin:4px 0 0;letter-spacing:-0.01em;
  }
  .admin-btn{
    background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;
    padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
  }
  .admin-btn.active{background:var(--alert);border-color:var(--alert);}
  
  .statsRow{display:flex;gap:8px;margin-top:14px;}
  .statChip{
    flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:8px;padding:8px 10px;
  }
  .statChip .n{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;line-height:1;}
  .statChip .l{font-size:10.5px;color:#B9DAD5;margin-top:3px;}
  .statChip.warn .n{color:#FFB199;}

  /* ---- Search + Tabs ---- */
  .controls{padding:14px 18px 0;background:var(--bg);position:sticky;top:0;z-index:10;}
  .searchWrap{position:relative;margin-bottom:10px;}
  .searchWrap input{
    width:100%;padding:10px 12px 10px 34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:14px;color:var(--ink);outline:none;
  }
  .searchWrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);}
  .tabs{display:flex;gap:6px;margin-bottom:10px;}
  .tab{
    flex:1;text-align:center;padding:8px 6px;border-radius:8px;font-size:12.5px;font-weight:600;
    border:1px solid var(--border);background:var(--surface);color:var(--ink-soft);cursor:pointer;
  }
  .tab.active{background:var(--teal);border-color:var(--teal);color:#fff;}

  /* ---- List ---- */
  .list{flex:1;padding:4px 18px 100px;overflow-y:auto;}
  .card{
    display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;cursor:pointer;position:relative;
  }
  .stub{
    width:var(--stub-w);flex-shrink:0;background:var(--teal-dark);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border-right:2px dashed rgba(255,255,255,0.35);
  }
  .card.overdue .stub{background:var(--alert);}
  .card.done .stub{background:var(--ok);}
  .stub::before,.stub::after{content:'';position:absolute;width:12px;height:12px;background:var(--bg);border-radius:50%;left:calc(var(--stub-w) - 6px);}
  .stub::before{top:-6px;}
  .stub::after{bottom:-6px;}
  .stub .num{font-family:'IBM Plex Mono',monospace;font-size:11px;writing-mode:vertical-rl;letter-spacing:.08em;font-weight:600;}
  .cardBody{flex:1;padding:12px 14px;min-width:0;}
  .cardTop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .deviceName{font-weight:700;font-size:15px;line-height:1.3;}
  .receiptNo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .stamp{
    font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;border:1.5px solid currentColor;border-radius:5px;padding:2px 6px;transform:rotate(-6deg);white-space:nowrap;flex-shrink:0;
  }
  .stamp.out{color:var(--teal);}
  .stamp.overdue{color:var(--alert);}
  .stamp.done{color:var(--ok);}
  .cardMeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--teal-tint);color:var(--teal-dark);font-weight:600;}
  .badge.vendor{background:#F1EEE6;color:#6B5D3F;}
  .cardDates{margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);display:flex;justify-content:space-between;}
  
  /* ---- Staff Instruction View ---- */
  .staff-box{text-align:center;padding:50px 24px;color:var(--ink-soft);}
  .staff-box p{font-size:15px;line-height:1.6;margin-bottom:20px;color:var(--ink);}

  /* ---- FAB ---- */
  .fab{
    position:absolute;right:20px;bottom:24px;z-index:15;background:var(--teal);color:#fff;border:none;border-radius:28px;padding:14px 20px 14px 16px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;box-shadow:0 8px 20px rgba(14,110,102,0.35);cursor:pointer;
  }

  /* ---- Screens ---- */
  .screen{position:absolute;inset:0;background:var(--bg);z-index:30;display:flex;flex-direction:column;}
  .screenHeader{background:var(--teal-dark);color:#fff;padding:16px 16px;display:flex;align-items:center;gap:10px;}
  .screenHeader button.back{background:rgba(255,255,255,0.12);border:none;color:#fff;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .screenHeader h2{font-size:17px;margin:0;font-weight:700;}
  .screenBody{flex:1;overflow-y:auto;padding:18px 18px 120px;}

  .section{margin-bottom:22px;}
  .section .secTitle{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-dark);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .section .secTitle::after{content:'';flex:1;height:1px;background:var(--line);}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .field label .req{color:var(--alert);}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:14px;color:var(--ink);outline:none;}
  .field textarea{resize:vertical;min-height:64px;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}

  /* --- 복수 물품 동적 레이아웃 --- */
  .itemBlock { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; position:relative; box-shadow:0 2px 8px rgba(0,0,0,0.02); }
  .itemBlockHeader { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px dashed var(--border); padding-bottom:6px; }
  .itemBlockTitle { font-weight:700; color:var(--teal-dark); font-size:14px; }
  .btnRemoveItem { background:var(--alert-tint); color:var(--alert); border:none; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; }
  .btnAddItem { background:var(--teal-tint); color:var(--teal-dark); border:1px dashed var(--teal); width:100%; padding:12px; border-radius:10px; font-weight:700; cursor:pointer; margin-bottom:20px; font-size:13.5px; text-align:center; }

  /* --- 4장 사진 콜라주 바둑판 Grid 시스템 --- */
  .photoBox{border:1.5px dashed var(--line);border-radius:10px;padding:16px;text-align:center;background:var(--surface);cursor:pointer;color:var(--ink-soft);font-size:13px;}
  .collageGrid { display:grid; gap:6px; margin-top:10px; grid-template-columns: repeat(2, 1fr); }
  .collageGrid img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:6px; border:1px solid var(--border); }

  /* --- 전자 서명 패드 스타일 --- */
  .signatureContainer { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px; position:relative; }
  canvas { width:100%; height:130px; background:#FAFBF9; border-radius:6px; touch-action:none; border:1px solid #ECECEC; }
  .sigControl { display:flex; justify-content:flex-end; margin-top:6px; }
  .btnClearSig { background:var(--ink-soft); color:#fff; border:none; padding:5px 12px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; }

  .btnRow{display:flex;gap:10px;margin-top:6px;}
  .btn{flex:1;padding:13px;border-radius:9px;border:none;font-weight:700;font-size:14px;cursor:pointer;}
  .btn.primary{background:var(--teal);color:#fff;}
  .btn.ghost{background:var(--surface);color:var(--ink-soft);border:1px solid var(--border);}

  /* Ticket Detail */
  .ticket{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .ticketHead{background:var(--teal-dark);color:#fff;padding:16px;position:relative;}
  .ticketHead .tName{font-size:18px;font-weight:700;}
  .ticketHead .tSub{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#B9DAD5;margin-top:3px;}
  .perf{height:0;border-top:2px dashed var(--line);position:relative;margin:0;}
  .perf::before,.perf::after{content:'';position:absolute;top:-7px;width:14px;height:14px;background:var(--bg);border-radius:50%;}
  .perf::before{left:-7px;}
  .perf::after{right:-7px;}
  .ticketBody{padding:16px;}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #EEF1EE;font-size:13.5px;}
  .kv .k{color:var(--ink-soft);}
  .kv .v{font-family:'IBM Plex Mono',monospace;font-weight:600;text-align:right;max-width:70%;word-break:break-all;}
  .symptomBox{background:#FAFBF9;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13.5px;line-height:1.6;margin-top:4px; margin-bottom:10px;}
  .photoViewGrid{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px;}
  .photoViewGrid img{width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; border:1px solid var(--border);}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:20px;font-size:13.5px;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="header-flex">
      <div class="eyebrow">BIOMEDICAL ENGINEERING</div>
      <button class="admin-btn" id="adminToggleBtn">🔑 운영자 로그인</button>
    </div>
    <h1>장비 반출입 관리</h1>
    <div class="statsRow" id="statsRow" style="display:none;"></div>
  </header>

  <div class="controls" id="adminControls" style="display:none;">
    <div class="searchWrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A9992" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="접수번호, 장비명, 업체명 검색">
    </div>
    <div class="tabs" id="tabsRow"></div>
  </div>

  <div class="list" id="listWrap">
    <div class="staff-box" id="staffNotice">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0E6E66" stroke-width="1.5" style="margin-bottom:12px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <p><b>외주 수리 대리점 엔지니어 전용</b><br>반출 장비 등록을 위해 아래 버튼을 누르세요.</p>
      <button class="btn primary" id="staffRegisterBtn" style="max-width:200px; margin:0 auto;">반출 등록 시작하기</button>
    </div>
  </div>

  <button class="fab" id="fabBtn" style="display:none;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    신규 반출 등록
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
const DEPTS = ["수술실", "마취통증의학과", "내과중환자실", "외과중환자실", "응급중환자실", "1신경계중환자실", "2신경계중환자실"];
const ADMIN_PASSWORD = "1234"; 

let records = [];
let filter = 'all';
let search = '';
let isAdminMode = false; 

const listWrap = document.getElementById('listWrap');
const statsRow = document.getElementById('statsRow');
const tabsRow = document.getElementById('tabsRow');
const adminControls = document.getElementById('adminControls');
const fabBtn = document.getElementById('fabBtn');
const adminToggleBtn = document.getElementById('adminToggleBtn');
const staffNotice = document.getElementById('staffNotice');
const app = document.getElementById('app');

const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxkPxainWkroq1I-gfCsL1Iax3GPZZDWj0UaPh6CQIinj67cJZdLAORF8VuLW1r5xKLpA/exec";

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

adminToggleBtn.addEventListener('click', ()=>{
  if(isAdminMode){
    isAdminMode = false;
    adminToggleBtn.textContent = "🔑 운영자 로그인";
    adminToggleBtn.classList.remove('active');
    toast('운영자 로그아웃 되었습니다.');
    hideAdminUI();
  }else{
    const pw = prompt("운영자(기사님) 전용 비밀번호를 입력하세요:");
    if(pw === ADMIN_PASSWORD){
      isAdminMode = true;
      adminToggleBtn.textContent = "🔒 인증해제(로그아웃)";
      adminToggleBtn.classList.add('active');
      toast('운영자 인증에 성공했습니다.');
      showAdminUI();
    }else if(pw !== null){
      alert("비밀번호가 일치하지 않습니다.");
    }
  }
});

function showAdminUI(){
  staffNotice.style.display = 'none';
  statsRow.style.display = 'flex';
  adminControls.style.display = 'block';
  fabBtn.style.display = 'flex';
  render();
}

function hideAdminUI(){
  statsRow.style.display = 'none';
  adminControls.style.display = 'none';
  fabBtn.style.display = 'none';
  listWrap.innerHTML = '';
  listWrap.appendChild(staffNotice);
}

document.getElementById('staffRegisterBtn').addEventListener('click', openRegister);
fabBtn.addEventListener('click', openRegister);

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysSince(dateStr){
  if(!dateStr) return 0;
  return Math.floor((new Date(todayStr()+'T00:00:00')-new Date(dateStr+'T00:00:00'))/(1000*60*60*24));
}
function isOverdue(r){ return r.outDate && !r.inDate && daysSince(r.outDate) >= 60; }
function statusOf(r){ if(r.inDate) return 'done'; if(isOverdue(r)) return 'overdue'; return 'out'; }
function fmtDate(d){ return d || '—'; }

const STORAGE_KEY = 'equipment-records-secured';

async function loadRecords(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    records = raw ? JSON.parse(raw) : [];
  }catch(e){ records = []; }
  if(isAdminMode) render();
}
async function saveRecords(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }catch(e){ toast('저장 실패'); }
}

function nextNumbering(){ return records.length ? Math.max(...records.map(r=>r.numbering||0))+1 : 1; }

function renderStats(){
  const total = records.length;
  const out = records.filter(r=>!r.inDate).length;
  const overdue = records.filter(isOverdue).length;
  statsRow.innerHTML = `
    <div class="statChip"><div class="n mono">${total}</div><div class="l">전체 등록</div></div>
    <div class="statChip"><div class="n mono">${out}</div><div class="l">반출 중</div></div>
    <div class="statChip warn"><div class="n mono">${overdue}</div><div class="l">지연 목록</div></div>
  `;
}

function renderTabs(){
  const tabs = [{id:'all', label:'전체'}, {id:'out', label:'반출 중'}, {id:'done', label:'반입 완료'}];
  tabsRow.innerHTML = tabs.map(t=>`<div class="tab ${filter===t.id?'active':''}" data-tab="${t.id}">${t.label}</div>`).join('');
  tabsRow.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click', ()=>{ filter = el.dataset.tab; render(); });
  });
}

function filteredRecords(){
  let list = records.slice().sort((a,b)=>{
    const sa = statusOf(a), sb = statusOf(b);
    const rank = {overdue:0, out:1, done:2};
    if(rank[sa]!==rank[sb]) return rank[sa]-rank[sb];
    return (b.createdAt||0)-(a.createdAt||0);
  });
  if(filter==='out') list = list.filter(r=>!r.inDate);
  if(filter==='done') list = list.filter(r=>!!r.inDate);
  if(search.trim()){
    const q = search.trim().toLowerCase();
    list = list.filter(r => (r.receiptNo||'').toLowerCase().includes(q) || (r.deviceName||'').toLowerCase().includes(q) || (r.vendor||'').toLowerCase().includes(q));
  }
  return list;
}

function renderList(){
  if(!isAdminMode) return;
  const list = filteredRecords();
  if(list.length===0){
    listWrap.innerHTML = `<div style="text-align:center; padding:50px; color:var(--ink-soft);">조회할 관리 내역 데이터가 없습니다.</div>`;
    return;
  }
  listWrap.innerHTML = list.map(r=>{
    const st = statusOf(r);
    const days = r.outDate ? daysSince(r.outDate) : 0;
    let stampHtml = st==='overdue' ? `<div class="stamp overdue">D+${days} 지연</div>` : (st==='out' ? `<div class="stamp out">반출중</div>` : `<div class="stamp done">반입완료</div>`);
    
    let displayTitle = r.deviceName || '-';
    if(r.items && r.items.length > 1) {
      displayTitle = `${r.items[0].deviceName} 외 ${r.items.length - 1}건`;
    }

    return `
    <div class="card ${st==='overdue'?'overdue':''} ${st==='done'?'done':''}" data-id="${r.id}">
      <div class="stub"><span class="num">NO. ${String(r.numbering).padStart(3,'0')}</span></div>
      <div class="cardBody">
        <div class="cardTop">
          <div style="max-width:70%;">
            <div class="deviceName" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(displayTitle)}</div>
            <div class="receiptNo">접수번호 ${escapeHtml(r.receiptNo||'-')}</div>
          </div>
          ${stampHtml}
        </div>
        <div class="cardMeta">
          <span class="badge">${escapeHtml(r.dept||'-')}</span>
          <span class="badge vendor">${escapeHtml(r.vendor||'업체 미지정')}</span>
        </div>
        <div class="cardDates">
          <span>반출 ${fmtDate(r.outDate)} → 반입 ${r.inDate?fmtDate(r.inDate):'미입고'}</span>
          <span class="dday ${st}">${r.inDate ? '완료' : (days+'일째')}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  listWrap.querySelectorAll('.card').forEach(el=>{ el.addEventListener('click', ()=>openDetail(el.dataset.id)); });
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function render(){ renderStats(); renderTabs(); renderList(); }

document.getElementById('searchInput').addEventListener('input', (e)=>{ search = e.target.value; renderList(); });

/* ---------------- 등록 폼 화면 ---------------- */
function openRegister(){
  const scr = document.createElement('div');
  scr.className = 'screen'; scr.id = 'registerScreen';
  scr.innerHTML = `
    <div class="screenHeader">
      <button class="back" id="regBack"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h2>외주 수리 장비 반출 등록</h2>
    </div>
    <div class="screenBody">
      <div class="section">
        <div class="secTitle">공통 접수 정보</div>
        <div class="row2">
          <div class="field"><label>접수번호</label><input type="text" id="f_receiptNo" placeholder="예: 2026-0071"></div>
          <div class="field"><label>사용부서 <span class="req">*</span></label>
            <select id="f_dept">${DEPTS.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="secTitle">반출 품목 상세</div>
        <div id="dynamicItemsContainer"></div>
        <button type="button" class="btnAddItem" id="btnDynamicAddItem">+ 반출 물품 추가하기</button>
      </div>

      <div class="section">
        <div class="secTitle">반출 정보 및 대차</div>
        <div class="row2">
          <div class="field"><label>반출일자 <span class="req">*</span></label><input type="date" id="f_outDate"></div>
          <div class="field"><label>대차 장비 S/N</label><input type="text" id="f_loanerSerial" placeholder="원내 보증 장비 일련번호"></div>
        </div>
      </div>
      
      <div class="section">
        <div class="secTitle">수탁 수리업체(대리점) 정보</div>
        <div class="field"><label>업체명</label><input type="text" id="f_vendor" placeholder="회사명 입력"></div>
        <div class="row2">
          <div class="field"><label>담당 엔지니어</label><input type="text" id="f_vendorContact" placeholder="성명"></div>
          <div class="field"><label>연락처</label><input type="tel" id="f_phone" placeholder="010-0000-0000"></div>
        </div>
      </div>
      <div class="section">
        <div class="secTitle">비고 및 특이사항</div>
        <div class="field"><textarea id="f_notes" placeholder="기타 전달사항"></textarea></div>
      </div>

      <div class="section">
        <div class="secTitle">대리점 직원 확인 서명 <span class="req">*</span></div>
        <div class="signatureContainer">
          <canvas id="signatureCanvas"></canvas>
          <div class="sigControl">
            <button type="button" class="btnClearSig" id="btnClearSig">서명 초기화</button>
          </div>
        </div>
      </div>

      <div class="btnRow">
        <button class="btn ghost" id="regCancel">취소</button>
        <button class="btn primary" id="regSubmit">최종 반출 등록 완료</button>
      </div>
    </div>
  `;
  app.appendChild(scr);
  document.getElementById('f_outDate').value = todayStr();
  document.getElementById('regBack').onclick = closeScreen;
  document.getElementById('regCancel').onclick = closeScreen;

  let blockCount = 0;
  const itemsContainer = document.getElementById('dynamicItemsContainer');
  const btnAddItem = document.getElementById('btnDynamicAddItem');

  function createNewItemBlock() {
    blockCount++;
    const block = document.createElement('div');
    block.className = 'itemBlock';
    block.id = `itemBlockId_${blockCount}`;
    block.photoArray = []; 

    block.innerHTML = `
      <div class="itemBlockHeader">
        <span class="itemBlockTitle">물품 항목 #${blockCount}</span>
        ${blockCount > 1 ? `<button type="button" class="btnRemoveItem">삭제</button>` : ''}
      </div>
      <div class="field">
        <label>장비명 <span class="req">*</span></label>
        <input type="text" class="i_deviceName" placeholder="의료기기 모델/제품명 입력">
      </div>
      <div class="row2">
        <div class="field"><label>장비코드</label><input type="text" class="i_assetCode" placeholder="자산코드"></div>
        <div class="field"><label>시리얼넘버 (S/N)</label><input type="text" class="i_serial" placeholder="제조사 제조 일련번호"></div>
      </div>
      <div class="field">
        <label>의뢰 고장 증상</label>
        <textarea class="i_symptom" placeholder="외관 손상 및 대리점 전달 고장 내역"></textarea>
      </div>
      <div class="field">
        <label>외관 상태 사진 (최대 4장)</label>
        <div class="photoBox i_photoBox">
          <div>📷 터치하여 카메라 촬영 또는 갤러리 파일 선택</div>
        </div>
        <input type="file" accept="image/*" multiple style="display:none;" class="i_photoInput">
        <div class="collageGrid i_collageGrid"></div>
      </div>
    `;
    itemsContainer.appendChild(block);

    const boxTrigger = block.querySelector('.i_photoBox');
    const fileInput = block.querySelector('.i_photoInput');
    const gridDisplay = block.querySelector('.i_collageGrid');

    boxTrigger.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const files = Array.from(e.target.files);
      if(files.length > 4) {
        alert("장비당 첨부 가능한 사진은 최대 4장입니다.");
        fileInput.value = "";
        return;
      }
      gridDisplay.innerHTML = "";
      block.photoArray = [];

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const scale = Math.min(1, 400/img.width);
            canvas.width = img.width*scale; canvas.height = img.height*scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            const compressedUrl = canvas.toDataURL('image/jpeg', 0.5);
            
            block.photoArray.push(compressedUrl);
            gridDisplay.innerHTML += `<img src="${compressedUrl}">`;
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    const removeBtn = block.querySelector('.btnRemoveItem');
    if(removeBtn) {
      removeBtn.onclick = () => block.remove();
    }
  }

  createNewItemBlock();
  btnAddItem.onclick = () => createNewItemBlock();

  const canvas = document.getElementById('signatureCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;

  function initCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineWidth = 3; ctx.strokeStyle = "#152420"; ctx.lineCap = "round";
  }
  setTimeout(initCanvas, 150);

  canvas.addEventListener('mousedown', (e)=>{ drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
  canvas.addEventListener('mousemove', (e)=>{ if(!drawing)return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
  canvas.addEventListener('mouseup', ()=>{ drawing=false; });

  canvas.addEventListener('touchstart', (e)=>{
    drawing=true; e.preventDefault();
    const t = e.touches[0]; const r = canvas.getBoundingClientRect();
    ctx.beginPath(); ctx.moveTo(t.clientX-r.left, t.clientY-r.top);
  });
  canvas.addEventListener('touchmove', (e)=>{
    if(!drawing)return; e.preventDefault();
    const t = e.touches[0]; const r = canvas.getBoundingClientRect();
    ctx.lineTo(t.clientX-r.left, t.clientY-r.top); ctx.stroke();
  });
  canvas.addEventListener('touchend', ()=>{ drawing=false; });

  document.getElementById('btnClearSig').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

  document.getElementById('regSubmit').onclick = async () => {
    const blocks = itemsContainer.querySelectorAll('.itemBlock');
    let itemRecords = [];
    let valid = true;

    // 구글 시트에 줄바꿈으로 깔끔하게 밀어넣기 위해 문자열 변환용 변수 선언
    let sheetDeviceNames = [];
    let sheetAssetCodes = [];
    let sheetSerials = [];
    let sheetSymptoms = [];

    blocks.forEach((b, index) => {
      const dName = b.querySelector('.i_deviceName').value.trim();
      const aCode = b.querySelector('.i_assetCode').value.trim();
      const sNumber = b.querySelector('.i_serial').value.trim();
      const sympt = b.querySelector('.i_symptom').value.trim();
      const phs = b.photoArray || [];

      if(!dName) {
        alert("장비명은 필수 기입 사항입니다.");
        b.querySelector('.i_deviceName').focus();
        valid = false;
        return;
      }
      itemRecords.push({ deviceName: dName, assetCode: aCode, serial: sNumber, symptom: sympt, photos: phs });

      // 구글 시트 셀 내부 텍스트 매핑 포맷 정의
      sheetDeviceNames.push(`[${index + 1}] ${dName}`);
      sheetAssetCodes.push(`[${index + 1}] ${aCode || '-'}`);
      sheetSerials.push(`[${index + 1}] ${sNumber || '-'}`);
      sheetSymptoms.push(`[${index + 1}] ${sympt || '-'}`);
    });

    if(!valid) return;

    const signatureData = canvas.toDataURL();
    const outDate = document.getElementById('f_outDate').value;
    const baseNotes = document.getElementById('f_notes').value.trim();

    const finalRecord = {
      id: 'r'+Date.now(),
      numbering: nextNumbering(),
      receiptNo: document.getElementById('f_receiptNo').value.trim(),
      dept: document.getElementById('f_dept').value,
      outDate,
      inDate: '',
      vendor: document.getElementById('f_vendor').value.trim(),
      vendorContact: document.getElementById('f_vendorContact').value.trim(),
      phone: document.getElementById('f_phone').value.trim(),
      loanerSerial: document.getElementById('f_loanerSerial').value.trim(),
      notes: baseNotes,
      createdAt: Date.now(),
      items: itemRecords,
      signature: signatureData,
      
      // 스마트폰 기기 내부 호환용 대표 매핑
      deviceName: itemRecords[0].deviceName,
      assetCode: itemRecords[0].assetCode,
      serial: itemRecords[0].serial,
      symptom: itemRecords[0].symptom
    };

    records.push(finalRecord);
    await saveRecords();
    if(isAdminMode) render();
    closeScreen();
    alert('다중 장비 반출 접수 및 엔지니어 인수 서명이 정상 저장되었습니다.');

    // ★ [핵심 패치] 구글 스프레드시트의 텍스트 셀에 완벽하게 바인딩되도록 포맷팅 전송
    if (GOOGLE_WEBAPP_URL && GOOGLE_WEBAPP_URL !== "여기에_구글_웹앱_새배포_URL을_넣으세요") {
      const payload = {
        numbering: finalRecord.numbering,
        receiptNo: finalRecord.receiptNo,
        dept: finalRecord.dept,
        outDate: finalRecord.outDate,
        inDate: finalRecord.inDate,
        vendor: finalRecord.vendor,
        vendorContact: finalRecord.vendorContact,
        phone: finalRecord.phone,
        loanerSerial: finalRecord.loanerSerial,
        
        // 구글 시트에 여러 품목이 한 셀 안에 각각 한 줄씩 깨지지 않고 보이도록 개행 처리(\n)
        deviceName: sheetDeviceNames.join("\n"),
        assetCode: sheetAssetCodes.join("\n"),
        serial: sheetSerials.join("\n"),
        symptom: sheetSymptoms.join("\n"),
        
        // 비고란 및 사진 등록 여부 확인 텍스트 매핑
        notes: `[통합 반출 건 - 총 ${itemRecords.length}개 품목 등록]\n${baseNotes}`,
        photoBefore: `[모바일 앱 내 서명 및 사진 ${itemRecords.reduce((acc, curr) => acc + curr.photos.length, 0)}장 첨부 완료]`
      };
      
      fetch(GOOGLE_WEBAPP_URL, { 
        method: "POST", 
        mode: "no-cors", 
        headers: { "Content-Type": "application/json" }, 
        body: JSON.stringify(payload) 
      });
    }
  };
}

/* ---------------- 상세 내역 조회 ---------------- */
function openDetail(id){
  if(!isAdminMode) return;
  const r = records.find(x=>x.id===id); if(!r) return;
  const scr = document.createElement('div'); scr.className = 'screen'; scr.id = 'detailScreen';
  
  let multiHtml = "";
  if(r.items && r.items.length > 0) {
    r.items.forEach((item, idx) => {
      let imgs = "";
      if(item.photos && item.photos.length > 0) {
        imgs = `<div class="photoViewGrid">${item.photos.map(p => `<img src="${p}">`).join('')}</div>`;
      }
      multiHtml += `
        <div style="background:#FAFBF9; border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px;">
          <div style="font-weight:700; color:var(--teal-dark); font-size:14px; margin-bottom:4px;">품목 #${idx+1}: ${escapeHtml(item.deviceName)}</div>
          <div style="font-size:12px; color:var(--ink-soft); margin-bottom:6px;">자산코드: ${escapeHtml(item.assetCode || '-')} / S/N: ${escapeHtml(item.serial || '-')}</div>
          <div class="symptomBox" style="margin:0;"><b>고장 의뢰 내용:</b><br>${escapeHtml(item.symptom || '-')}</div>
          ${imgs}
        </div>
      `;
    });
  } else {
    let singleImg = r.photoBefore ? `<div class="photoViewGrid"><img src="${r.photoBefore}"></div>` : '';
    multiHtml = `
      <div style="background:#FAFBF9; border:1px solid var(--border); border-radius:10px; padding:12px;">
        <div style="font-weight:700; color:var(--teal-dark);">${escapeHtml(r.deviceName)}</div>
        <div style="font-size:12px; color:var(--ink-soft);">자산코드: ${escapeHtml(r.assetCode || '-')} / S/N: ${escapeHtml(r.serial || '-')}</div>
        <div class="symptomBox">${escapeHtml(r.symptom || '-')}</div>
        ${singleImg}
      </div>
    `;
  }

  scr.innerHTML = `
    <div class="screenHeader">
      <button class="back" id="detBack"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h2>운영자 반출입 상세내역</h2>
    </div>
    <div class="screenBody">
      <div class="ticket">
        <div class="ticketHead">
          <div class="tName">장비 외주 반출 정보</div>
          <div class="tSub">NO. ${String(r.numbering).padStart(3,'0')} · 접수번호 ${escapeHtml(r.receiptNo||'-')}</div>
        </div>
        <div class="perf"></div>
        <div class="ticketBody">
          <div class="kv"><span class="k">사용부서</span><span class="v">${escapeHtml(r.dept||'-')}</span></div>
          <div class="kv"><span class="k">반출일자</span><span class="v">${fmtDate(r.outDate)}</span></div>
          <div class="kv"><span class="k">반입일자</span><span class="v" id="detInDateView">${r.inDate?fmtDate(r.inDate):'미입고 (반출중)'}</span></div>
          <div class="kv"><span class="k">대리점/엔지니어</span><span class="v">${escapeHtml(r.vendor||'-')} (${escapeHtml(r.vendorContact||'-')})</span></div>
          <div class="kv"><span class="k">대차 장비 일련번호</span><span class="v">${escapeHtml(r.loanerSerial||'-')}</span></div>
        </div>
      </div>
      
      <div class="section">
        <div class="secTitle">반출 기기별 정보 및 실사</div>
        ${multiHtml}
      </div>

      ${r.signature ? `
      <div class="section">
        <div class="secTitle">인수 확인 서명 자필 기록</div>
        <div style="background:#fff; border:1px solid var(--border); border-radius:10px; padding:8px; text-align:center;">
          <img src="${r.signature}" style="max-height:90px; max-width:100%;">
        </div>
      </div>` : ''}

      <div class="btnRow" id="detailBtnArea">
        ${!r.inDate ? `<button class="btn primary" id="markReturned">확인 및 반입 완료(입고) 처리</button>` : ''}
      </div>
    </div>
  `;
  app.appendChild(scr);
  document.getElementById('detBack').onclick = closeScreen;

  const markBtn = document.getElementById('markReturned');
  if(markBtn){
    markBtn.onclick = async ()=>{
      if(!confirm('선택하신 의료장비를 원내로 반입 완료(입고) 처리하시겠습니까?')) return;
      
      const targetInDate = todayStr();
      r.inDate = targetInDate; 
      await saveRecords();
      
      if (GOOGLE_WEBAPP_URL && GOOGLE_WEBAPP_URL !== "여기에_구글_웹앱_새배포_URL을_넣으세요") {
        const updatePayload = { action: "updateInDate", receiptNo: r.receiptNo, inDate: targetInDate };
        fetch(GOOGLE_WEBAPP_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updatePayload) });
      }
      
      render(); 
      closeScreen(); 
      toast('성공적으로 입고 확인 처리가 마감되었습니다.');
    };
  }
}

function closeScreen(){ const scr = app.querySelector('.screen'); if(scr) scr.remove(); }
loadRecords();
</script>
</body>
</html>
